name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  NG_CLI_ANALYTICS: "false"

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Path Filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  backend-ci:
    name: Backend CI (Spring Boot)
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test Backend
        working-directory: backend
        run: ./mvnw clean test

      - name: Upload JaCoCo Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-coverage
          path: backend/target/site/jacoco/
          retention-days: 7

  frontend-ci:
    name: Frontend CI (Angular)
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Security Audit (npm audit)
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Format Check (Prettier)
        working-directory: frontend
        run: npx prettier --check "src/**/*.{ts,html,css,json}"

      - name: Run Unit Tests (Jest)
        working-directory: frontend
        run: npm run test:coverage

      - name: Compile Application (Angular Build)
        working-directory: frontend
        run: npm run build

      - name: Upload Jest Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-jest-coverage
          path: frontend/coverage/
          retention-days: 7

  e2e-tests:
    name: End-to-End Tests (Cypress)
    needs: [detect-changes, backend-ci, frontend-ci]
    if: |
      always() &&
      (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true') &&
      (needs.backend-ci.result == 'success' || needs.backend-ci.result == 'skipped') &&
      (needs.frontend-ci.result == 'success' || needs.frontend-ci.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Start Backend Service
        working-directory: backend
        run: ./mvnw spring-boot:run &

      - name: Wait for Backend Service
        run: |
          echo "Waiting for Spring Boot backend to start..."
          timeout 90s bash -c 'until curl --silent --fail http://localhost:9000/v3/api-docs; do sleep 2; done'
          echo "Backend is up!"

      - name: Run Cypress E2E Tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          start: npx vite
          wait-on: 'http://localhost:4200'
          wait-on-timeout: 120

      - name: Upload Cypress Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots/
          retention-days: 7

      - name: Upload Cypress Videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: frontend/cypress/videos/
          retention-days: 7

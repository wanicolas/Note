name: CD Pipeline (Docker Delivery)

on:
  push:
    branches: [ main ]

permissions:
  contents: read

env:
  NG_CLI_ANALYTICS: "false"

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Path Filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/cd.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/cd.yml'

  deploy-docker:
    name: Build & Push to Docker Hub
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend Docker image
        if: needs.detect-changes.outputs.backend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}/note-backend:latest
            ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}/note-backend:${{ github.sha }}

      - name: Build and push Frontend Docker image
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}/note-frontend:latest
            ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}/note-frontend:${{ github.sha }}
